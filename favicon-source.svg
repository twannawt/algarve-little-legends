<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="hsl(140,20%,42%)"/>
      <stop offset="100%" stop-color="hsl(140,24%,52%)"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <!-- Two stars for "legends" -->
  <g fill="hsl(42,45%,72%)" opacity="0.9">
    <polygon points="130,100 138,125 164,125 143,140 151,165 130,150 109,165 117,140 96,125 122,125"/>
    <polygon points="382,80 388,98 407,98 392,108 398,126 382,116 366,126 372,108 357,98 376,98"/>
  </g>
  <!-- Stylized "LL" letterform -->
  <g fill="white" opacity="0.95">
    <!-- First L -->
    <rect x="120" y="185" width="42" height="210" rx="10"/>
    <rect x="120" y="365" width="120" height="38" rx="10"/>
    <!-- Second L -->
    <rect x="272" y="185" width="42" height="210" rx="10"/>
    <rect x="272" y="365" width="120" height="38" rx="10"/>
  </g>
  <!-- Small leaf accent -->
  <g transform="translate(256,440)" fill="hsl(42,45%,72%)" opacity="0.8">
    <ellipse cx="-18" cy="0" rx="14" ry="6" transform="rotate(-30)"/>
    <ellipse cx="18" cy="0" rx="14" ry="6" transform="rotate(30)"/>
    <circle cx="0" cy="-4" r="3"/>
  </g>
</svg>
